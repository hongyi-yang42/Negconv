<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>negconv</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a1a; color: #ddd; display: flex; height: 100vh; overflow: hidden; }

/* Viewer area */
#viewer { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #111; min-width: 200px; }
#viewer-img { position: absolute; transform-origin: 0 0; }
#viewer img { display: block; }
#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 1.2em; display: none; }
#loading.active { display: block; }

/* Resize handle */
#resize-handle { width: 6px; cursor: col-resize; background: #333; flex-shrink: 0; transition: background 0.15s; }
#resize-handle:hover, #resize-handle.active { background: #2a6; }

/* Crop overlay */
#crop-overlay { position: absolute; top: 0; left: 0; width: 0; height: 0; pointer-events: none; }
.crop-mask { position: absolute; background: rgba(0,0,0,0.5); }
#crop-border { position: absolute; border: 2px dashed rgba(255,255,255,0.8); pointer-events: none; }
#crop-drawing { position: absolute; border: 2px dashed #c63; background: rgba(200,100,50,0.1); display: none; }

/* Histogram */
#histogram-wrap { position: absolute; bottom: 12px; left: 12px; display: none; background: rgba(0,0,0,0.7); border-radius: 4px; padding: 4px; }
#histogram-wrap.visible { display: block; }
#histogram-canvas { display: block; }

/* Sidebar */
#sidebar { width: 280px; min-width: 200px; max-width: 500px; background: #222; border-left: 1px solid #333; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; }
#sidebar h2 { font-size: 1em; color: #999; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #333; padding-bottom: 4px; }
#sidebar label { display: flex; align-items: center; gap: 6px; font-size: 0.85em; }
#sidebar label .lbl { min-width: 56px; cursor: pointer; user-select: none; }
#sidebar label .lbl:hover { color: #2a6; }
#sidebar input[type="range"] { flex: 1; min-width: 60px; }
#sidebar input[type="number"] { width: 60px; background: #333; border: 1px solid #444; color: #ddd; padding: 2px 4px; border-radius: 3px; font-size: 0.85em; font-variant-numeric: tabular-nums; text-align: right; }
#sidebar input[type="number"]:focus { border-color: #2a6; outline: none; }
#sidebar input[type="number"].readonly-dmin { opacity: 0.7; cursor: default; }
.btn { padding: 8px 14px; border: 1px solid #555; background: #333; color: #ddd; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
.btn:hover { background: #444; }
.btn-primary { background: #2a6; border-color: #2a6; }
.btn-primary:hover { background: #397; }
.btn-active { background: #c63; border-color: #c63; }
#file-row { display: flex; gap: 6px; }
#file-row input { flex: 1; background: #333; border: 1px solid #444; color: #ddd; padding: 6px 8px; border-radius: 3px; font-size: 0.9em; }
#status { font-size: 0.8em; color: #888; line-height: 1.5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.preset-row { display: flex; gap: 6px; }
.preset-row .btn { flex: 1; text-align: center; }
.section { display: flex; flex-direction: column; gap: 6px; }
.lbl[title] { text-decoration: underline dotted; text-decoration-color: #555; }
</style>
</head>
<body>

<div id="viewer">
  <div id="loading">Loading...</div>
  <div id="viewer-img">
    <img id="preview" src="" alt="Load an image to begin" style="display:none;">
  </div>
  <div id="crop-overlay">
    <div class="crop-mask" id="mask-top"></div>
    <div class="crop-mask" id="mask-bottom"></div>
    <div class="crop-mask" id="mask-left"></div>
    <div class="crop-mask" id="mask-right"></div>
    <div id="crop-border"></div>
  </div>
  <div id="crop-drawing"></div>
  <div id="histogram-wrap">
    <canvas id="histogram-canvas" width="240" height="120"></canvas>
  </div>
</div>

<div id="resize-handle"></div>

<div id="sidebar">

  <!-- File load -->
  <div class="section">
    <h2>File</h2>
    <div id="file-row">
      <input id="filepath" type="text" placeholder="/path/to/scan.ARW" spellcheck="false">
      <button class="btn btn-primary" id="btn-load">Load</button>
      <button class="btn" id="btn-clear">Clear</button>
    </div>
    <div id="status">No image loaded</div>
  </div>

  <!-- Eyedropper -->
  <div class="section">
    <h2>Dmin (film base)</h2>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="btn" id="btn-pick">Pick Dmin</button>
      <span style="font-size:0.85em;">Click film base area</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <label>R <input type="number" id="dmin-r" class="readonly-dmin" step="0.001" min="0.01" max="2.0" value="" readonly></label>
      <label>G <input type="number" id="dmin-g" class="readonly-dmin" step="0.001" min="0.01" max="2.0" value="" readonly></label>
      <label>B <input type="number" id="dmin-b" class="readonly-dmin" step="0.001" min="0.01" max="2.0" value="" readonly></label>
    </div>
  </div>

  <!-- Crop -->
  <div class="section">
    <h2>Crop</h2>
    <div style="display:flex;gap:6px;">
      <button class="btn" id="btn-crop">Set Crop</button>
      <button class="btn" id="btn-clear-crop">Clear Crop</button>
    </div>
    <div id="crop-info" style="font-size:0.8em;color:#888;display:none;"></div>
  </div>

  <!-- Presets -->
  <div class="section">
    <h2>Presets</h2>
    <div class="preset-row">
      <button class="btn" id="btn-preset-color">Color (C-41)</button>
      <button class="btn" id="btn-preset-bw">B&amp;W</button>
    </div>
  </div>

  <!-- Invert -->
  <div class="section">
    <button class="btn btn-primary" id="btn-invert" style="width:100%">Invert</button>
    <div style="display:flex;gap:6px;margin-top:4px;">
      <button class="btn" id="btn-before-after" style="flex:1" title="Toggle between original and inverted (\)">Before/After</button>
      <button class="btn" id="btn-histogram" style="flex:0" title="Toggle RGB histogram (H)">Hist</button>
    </div>
  </div>

  <!-- Parameters -->
  <div class="section">
    <h2>Parameters</h2>
    <label><span class="lbl" data-target="sl-dmax" title="Film dynamic range in optical density units. Controls how far the density-to-print mapping stretches. Typical: 1.5–2.5 (B&W up to 3.0). Higher = more contrast. Range: 0.5–4.0. Alt+click to reset.">Dmax</span> <input type="range" id="sl-dmax" min="0.5" max="4.0" step="0.01" value="1.6" data-default="1.6"> <input type="number" id="num-dmax" min="0.5" max="4.0" step="0.01" value="1.60"></label>
    <label><span class="lbl" data-target="sl-gamma" title="Paper grade / contrast. Simulates photographic paper gamma. Higher = harder paper (more contrast). Color film: 3–5, B&W: 4–6. Range: 1.0–8.0. Alt+click to reset.">Gamma</span> <input type="range" id="sl-gamma" min="1.0" max="8.0" step="0.1" value="4.0" data-default="4.0"> <input type="number" id="num-gamma" min="1.0" max="8.0" step="0.1" value="4.0"></label>
    <label><span class="lbl" data-target="sl-exposure" title="Paper exposure strength. Controls overall brightness of the print. Increase to brighten shadows, decrease to deepen them. Default 0.92 for typical film. Range: 0.1–2.0. Alt+click to reset.">Exposure</span> <input type="range" id="sl-exposure" min="0.1" max="2.0" step="0.01" value="0.92" data-default="0.9245"> <input type="number" id="num-exposure" min="0.1" max="2.0" step="0.01" value="0.92"></label>
    <label><span class="lbl" data-target="sl-black" title="Paper black point offset. Sets the minimum density (D-min) of the simulated paper. Increase to lift shadows, decrease for deeper blacks. Default 0.08. Range: 0.0–0.5. Alt+click to reset.">Black</span> <input type="range" id="sl-black" min="0.0" max="0.5" step="0.01" value="0.08" data-default="0.0755"> <input type="number" id="num-black" min="0.0" max="0.5" step="0.01" value="0.08"></label>
    <label><span class="lbl" data-target="sl-softclip" title="Highlight roll-off. Prevents harsh clipping of bright highlights. 1.0 = no soft clip, lower = earlier/gentler rolloff. Default 0.75. Range: 0.0–1.0. Alt+click to reset.">Soft clip</span> <input type="range" id="sl-softclip" min="0.0" max="1.0" step="0.01" value="0.75" data-default="0.75"> <input type="number" id="num-softclip" min="0.0" max="1.0" step="0.01" value="0.75"></label>
    <label><span class="lbl" data-target="sl-offset" title="Density offset in log space. Shifts the entire density curve up or down. Primarily for scanner black-point calibration — usually left at -0.05. Range: -0.5–0.5. Alt+click to reset.">Offset</span> <input type="range" id="sl-offset" min="-0.5" max="0.5" step="0.01" value="-0.05" data-default="-0.05"> <input type="number" id="num-offset" min="-0.5" max="0.5" step="0.01" value="-0.05"></label>
  </div>

  <div class="section">
    <h2>White Balance High</h2>
    <label><span class="lbl" data-target="sl-wbh-r" title="Highlight white balance — Red channel. Multiplier for the red channel in highlight densities. 1.0 = neutral. Adjust to correct color casts in bright areas. Range: 0.5–2.0. Alt+click to reset.">R</span> <input type="range" id="sl-wbh-r" min="0.5" max="2.0" step="0.01" value="1.0" data-default="1.0"> <input type="number" id="num-wbh-r" min="0.5" max="2.0" step="0.01" value="1.00"></label>
    <label><span class="lbl" data-target="sl-wbh-g" title="Highlight white balance — Green channel. Multiplier for the green channel in highlight densities. 1.0 = neutral. Range: 0.5–2.0. Alt+click to reset.">G</span> <input type="range" id="sl-wbh-g" min="0.5" max="2.0" step="0.01" value="1.0" data-default="1.0"> <input type="number" id="num-wbh-g" min="0.5" max="2.0" step="0.01" value="1.00"></label>
    <label><span class="lbl" data-target="sl-wbh-b" title="Highlight white balance — Blue channel. Multiplier for the blue channel in highlight densities. 1.0 = neutral. Range: 0.5–2.0. Alt+click to reset.">B</span> <input type="range" id="sl-wbh-b" min="0.5" max="2.0" step="0.01" value="1.0" data-default="1.0"> <input type="number" id="num-wbh-b" min="0.5" max="2.0" step="0.01" value="1.00"></label>
  </div>

  <div class="section">
    <h2>White Balance Low</h2>
    <label><span class="lbl" data-target="sl-wbl-r" title="Shadow white balance — Red channel. Multiplier for the red channel in shadow densities. Corrects color casts in dark areas. Range: 0.5–2.0. Alt+click to reset.">R</span> <input type="range" id="sl-wbl-r" min="0.5" max="2.0" step="0.01" value="1.0" data-default="1.0"> <input type="number" id="num-wbl-r" min="0.5" max="2.0" step="0.01" value="1.00"></label>
    <label><span class="lbl" data-target="sl-wbl-g" title="Shadow white balance — Green channel. Multiplier for the green channel in shadow densities. Range: 0.5–2.0. Alt+click to reset.">G</span> <input type="range" id="sl-wbl-g" min="0.5" max="2.0" step="0.01" value="1.0" data-default="1.0"> <input type="number" id="num-wbl-g" min="0.5" max="2.0" step="0.01" value="1.00"></label>
    <label><span class="lbl" data-target="sl-wbl-b" title="Shadow white balance — Blue channel. Multiplier for the blue channel in shadow densities. Range: 0.5–2.0. Alt+click to reset.">B</span> <input type="range" id="sl-wbl-b" min="0.5" max="2.0" step="0.01" value="1.0" data-default="1.0"> <input type="number" id="num-wbl-b" min="0.5" max="2.0" step="0.01" value="1.00"></label>
  </div>
    <label><span class="lbl" data-target="sl-wbl-g">G</span> <input type="range" id="sl-wbl-g" min="0.5" max="2.0" step="0.01" value="1.0" data-default="1.0"> <input type="number" id="num-wbl-g" min="0.5" max="2.0" step="0.01" value="1.00"></label>
    <label><span class="lbl" data-target="sl-wbl-b">B</span> <input type="range" id="sl-wbl-b" min="0.5" max="2.0" step="0.01" value="1.0" data-default="1.0"> <input type="number" id="num-wbl-b" min="0.5" max="2.0" step="0.01" value="1.00"></label>
  </div>

  <!-- Export -->
  <div class="section">
    <h2>Export</h2>
    <div style="display:flex;gap:6px;">
      <button class="btn" id="btn-export-16" style="flex:1">TIFF 16-bit</button>
      <button class="btn" id="btn-export-32" style="flex:1">TIFF 32f</button>
    </div>
  </div>

  <div style="font-size:0.7em;color:#555;margin-top:8px;">Alt+click label to reset</div>
</div>

<script>
// State
let pickingDmin = false;
let cropMode = false;
let cropDrawing = false;
let cropStartX = 0, cropStartY = 0;
let cropRectOrig = null; // {"x","y","w","h"} in original coords, or null
let previewWidth = 0;
let previewHeight = 0;
let currentFilename = "";
let currentDims = [0, 0];
let zoomLevel = 1;
let panX = 0, panY = 0;
let isPanning = false;
let lastMouseX = 0, lastMouseY = 0;
let debounceTimer = null;

const $ = id => document.getElementById(id);
const img = $("preview");
const viewerImg = $("viewer-img");

// Slider↔number input pairs
const sliderPairs = [
  { sl: "sl-dmax",     num: "num-dmax" },
  { sl: "sl-gamma",    num: "num-gamma" },
  { sl: "sl-exposure", num: "num-exposure" },
  { sl: "sl-black",    num: "num-black" },
  { sl: "sl-softclip", num: "num-softclip" },
  { sl: "sl-offset",   num: "num-offset" },
  { sl: "sl-wbh-r",    num: "num-wbh-r" },
  { sl: "sl-wbh-g",    num: "num-wbh-g" },
  { sl: "sl-wbh-b",    num: "num-wbh-b" },
  { sl: "sl-wbl-r",    num: "num-wbl-r" },
  { sl: "sl-wbl-g",    num: "num-wbl-g" },
  { sl: "sl-wbl-b",    num: "num-wbl-b" },
];

// Loading indicator
function setLoading(on) {
  $("loading").classList.toggle("active", on);
}

// Single-line status
function updateStatus() {
  const dminR = $("dmin-r").value;
  const dminG = $("dmin-g").value;
  const dminB = $("dmin-b").value;
  let text = currentFilename ? `${currentFilename}  ${currentDims[0]}x${currentDims[1]}` : "No image loaded";
  if (dminR) text += ` | Dmin: R=${parseFloat(dminR).toFixed(4)} G=${parseFloat(dminG).toFixed(4)} B=${parseFloat(dminB).toFixed(4)}`;
  $("status").textContent = text;
}

// Sync slider → number input
function syncSlToNum(slId, numId) {
  const sl = $(slId);
  const num = $(numId);
  num.value = parseFloat(sl.value).toFixed(sl.step.includes(".0") ? 1 : 2);
}

// Sync number input → slider
function syncNumToSl(numId, slId) {
  const num = $(numId);
  const sl = $(slId);
  const v = parseFloat(num.value);
  if (isNaN(v)) return;
  sl.value = v;
}

// Gather current params
function gatherParams() {
  return {
    d_max:     parseFloat($("sl-dmax").value),
    gamma:     parseFloat($("sl-gamma").value),
    exposure:  parseFloat($("sl-exposure").value),
    black:     parseFloat($("sl-black").value),
    soft_clip: parseFloat($("sl-softclip").value),
    offset:    parseFloat($("sl-offset").value),
    wb_high: [
      parseFloat($("sl-wbh-r").value),
      parseFloat($("sl-wbh-g").value),
      parseFloat($("sl-wbh-b").value),
    ],
    wb_low: [
      parseFloat($("sl-wbl-r").value),
      parseFloat($("sl-wbl-g").value),
      parseFloat($("sl-wbl-b").value),
    ],
  };
}

// Push params to server and re-invert
function pushParams() {
  fetch("/api/params", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(gatherParams()),
  }).then(() => doInvert());
}

function onParamChange() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(pushParams, 300);
}

// Bind slider ↔ number pairs
sliderPairs.forEach(pair => {
  const sl = $(pair.sl);
  const num = $(pair.num);

  // Slider input → update number display → debounce push
  sl.addEventListener("input", () => {
    syncSlToNum(pair.sl, pair.num);
    onParamChange();
  });

  // Number input → update slider → debounce push
  num.addEventListener("input", () => {
    syncNumToSl(pair.num, pair.sl);
    onParamChange();
  });

  // Enter in number input → commit immediately
  num.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      num.blur();
      clearTimeout(debounceTimer);
      pushParams();
    }
  });
});

// Alt+click label → reset slider to default
document.querySelectorAll(".lbl[data-target]").forEach(lbl => {
  lbl.addEventListener("click", (e) => {
    if (!e.altKey) return;
    const slId = lbl.dataset.target;
    const sl = $(slId);
    if (!sl || sl.dataset.default === undefined) return;
    sl.value = sl.dataset.default;
    const pair = sliderPairs.find(p => p.sl === slId);
    if (pair) syncSlToNum(pair.sl, pair.num);
    onParamChange();
  });
});

// Update UI from server params
function updateUI(params) {
  if (params.dmin) {
    $("dmin-r").value = params.dmin[0].toFixed(4);
    $("dmin-g").value = params.dmin[1].toFixed(4);
    $("dmin-b").value = params.dmin[2].toFixed(4);
  }
  const mapping = {
    "sl-dmax": params.d_max, "sl-gamma": params.gamma,
    "sl-exposure": params.exposure, "sl-black": params.black,
    "sl-softclip": params.soft_clip, "sl-offset": params.offset,
  };
  for (const [slId, val] of Object.entries(mapping)) {
    if (val !== undefined) {
      $(slId).value = val;
      const pair = sliderPairs.find(p => p.sl === slId);
      if (pair) syncSlToNum(pair.sl, pair.num);
    }
  }
  if (params.wb_high) {
    ["sl-wbh-r","sl-wbh-g","sl-wbh-b"].forEach((id, i) => {
      $(id).value = params.wb_high[i];
      const pair = sliderPairs.find(p => p.sl === id);
      if (pair) syncSlToNum(pair.sl, pair.num);
    });
  }
  if (params.wb_low) {
    ["sl-wbl-r","sl-wbl-g","sl-wbl-b"].forEach((id, i) => {
      $(id).value = params.wb_low[i];
      const pair = sliderPairs.find(p => p.sl === id);
      if (pair) syncSlToNum(pair.sl, pair.num);
    });
  }
}

// Load image
$("btn-load").addEventListener("click", () => {
  const path = $("filepath").value.trim();
  if (!path) return;
  setLoading(true);
  fetch("/api/load", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({path}),
  })
  .then(r => r.json())
  .then(data => {
    setLoading(false);
    if (data.error) { alert(data.error); return; }
    img.src = "/api/preview/orig?" + Date.now();
    img.style.display = "block";
    if (data.preview_dims) {
      previewWidth = data.preview_dims[0];
      previewHeight = data.preview_dims[1];
    }
    currentFilename = data.filename;
    currentDims = data.dims;
    cropRectOrig = data.crop_rect || null;
    updateUI(data.params);
    updateStatus();
    updateCropOverlay();
    fitToWindow();
  })
  .catch(e => { setLoading(false); alert("Load failed: " + e); });
});

// Invert
function doInvert() {
  setLoading(true);
  fetch("/api/invert", {method: "POST"})
  .then(r => r.json())
  .then(data => {
    setLoading(false);
    if (data.error) { alert(data.error); return; }
    img.src = "/api/preview/result?" + Date.now();
    updateUI(data.params);
  })
  .catch(e => { setLoading(false); alert("Invert failed: " + e); });
}
$("btn-invert").addEventListener("click", doInvert);

// Eyedropper
$("btn-pick").addEventListener("click", () => {
  pickingDmin = !pickingDmin;
  $("btn-pick").classList.toggle("btn-active", pickingDmin);
  img.style.cursor = pickingDmin ? "crosshair" : "default";
});

img.addEventListener("click", (e) => {
  if (!pickingDmin) return;
  const rect = img.getBoundingClientRect();
  const scaleX = previewWidth / rect.width;
  const scaleY = previewHeight / rect.height;
  const px = Math.round((e.clientX - rect.left) * scaleX);
  const py = Math.round((e.clientY - rect.top) * scaleY);

  setLoading(true);
  fetch("/api/pick-dmin", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({x: px, y: py}),
  })
  .then(r => r.json())
  .then(data => {
    setLoading(false);
    if (data.error) { alert(data.error); return; }
    updateUI(data.params);
    img.src = "/api/preview/result?" + Date.now();
    updateStatus();
  })
  .catch(e => { setLoading(false); alert("Pick failed: " + e); });
});

// ---- Crop tool ----
// Convert client coords to preview pixel coords (accounts for CSS transform)
function clientToPreview(cx, cy) {
  const rect = img.getBoundingClientRect();
  const scaleX = previewWidth / rect.width;
  const scaleY = previewHeight / rect.height;
  return {
    x: Math.round((cx - rect.left) * scaleX),
    y: Math.round((cy - rect.top) * scaleY),
  };
}

// Convert preview pixel coords to original image coords
function previewToOrig(px, py) {
  return {
    x: Math.round(px * currentDims[1] / previewWidth),
    y: Math.round(py * currentDims[0] / previewHeight),
  };
}

// Position the 4 dark mask divs + border around crop rectangle (in viewer space)
function updateCropOverlay() {
  const maskTop = $("mask-top"), maskBot = $("mask-bottom");
  const maskLeft = $("mask-left"), maskRight = $("mask-right");
  const border = $("crop-border");
  const info = $("crop-info");

  if (!cropRectOrig || !previewWidth) {
    maskTop.style.display = "none";
    maskBot.style.display = "none";
    maskLeft.style.display = "none";
    maskRight.style.display = "none";
    border.style.display = "none";
    info.style.display = "none";
    return;
  }

  // Convert original crop rect to preview coords, then to viewer CSS coords
  const rect = img.getBoundingClientRect();
  const vw = $("viewer").clientWidth;
  const vh = $("viewer").clientHeight;
  const scaleX = rect.width / previewWidth;
  const scaleY = rect.height / previewHeight;
  const scaleOX = currentDims[1] / previewWidth;
  const scaleOY = currentDims[0] / previewHeight;

  const cx = rect.left + cropRectOrig.x / scaleOX * scaleX;
  const cy = rect.top + cropRectOrig.y / scaleOY * scaleY;
  const cw = cropRectOrig.w / scaleOX * scaleX;
  const ch = cropRectOrig.h / scaleOY * scaleY;

  maskTop.style.cssText = `position:absolute;display:block;background:rgba(0,0,0,0.5);left:0;top:0;width:${vw}px;height:${cy}px;pointer-events:none;`;
  maskBot.style.cssText = `position:absolute;display:block;background:rgba(0,0,0,0.5);left:0;top:${cy+ch}px;width:${vw}px;height:${vh-cy-ch}px;pointer-events:none;`;
  maskLeft.style.cssText = `position:absolute;display:block;background:rgba(0,0,0,0.5);left:0;top:${cy}px;width:${cx}px;height:${ch}px;pointer-events:none;`;
  maskRight.style.cssText = `position:absolute;display:block;background:rgba(0,0,0,0.5);left:${cx+cw}px;top:${cy}px;width:${vw-cx-cw}px;height:${ch}px;pointer-events:none;`;
  border.style.cssText = `position:absolute;display:block;border:2px dashed rgba(255,255,255,0.8);left:${cx}px;top:${cy}px;width:${cw}px;height:${ch}px;pointer-events:none;`;
  info.style.display = "block";
  info.textContent = `Crop: ${cropRectOrig.w}x${cropRectOrig.h} at (${cropRectOrig.x}, ${cropRectOrig.y})`;
}

// Crop mode toggle
$("btn-crop").addEventListener("click", () => {
  cropMode = !cropMode;
  $("btn-crop").classList.toggle("btn-active", cropMode);
  if (cropMode) { pickingDmin = false; $("btn-pick").classList.remove("btn-active"); }
  img.style.cursor = cropMode ? "crosshair" : (pickingDmin ? "crosshair" : "default");
});

// Clear crop
$("btn-clear-crop").addEventListener("click", () => {
  setLoading(true);
  fetch("/api/crop", {method: "DELETE"})
  .then(r => r.json())
  .then(data => {
    setLoading(false);
    if (data.error) { alert(data.error); return; }
    cropRectOrig = null;
    img.src = "/api/preview/result?" + Date.now();
    updateUI(data.params);
    updateCropOverlay();
  })
  .catch(e => { setLoading(false); alert("Clear crop failed: " + e); });
});

// Crop drawing via click+drag
$("viewer").addEventListener("mousedown", (e) => {
  if (!cropMode || e.button !== 0) return;
  if (img.style.display === "none") return;
  cropDrawing = true;
  cropStartX = e.clientX;
  cropStartY = e.clientY;
  const drawEl = $("crop-drawing");
  drawEl.style.display = "block";
  drawEl.style.left = e.clientX + "px";
  drawEl.style.top = e.clientY + "px";
  drawEl.style.width = "0px";
  drawEl.style.height = "0px";
  e.preventDefault();
});

window.addEventListener("mousemove", (e) => {
  if (!cropDrawing) return;
  const drawEl = $("crop-drawing");
  const x = Math.min(cropStartX, e.clientX);
  const y = Math.min(cropStartY, e.clientY);
  const w = Math.abs(e.clientX - cropStartX);
  const h = Math.abs(e.clientY - cropStartY);
  drawEl.style.left = x + "px";
  drawEl.style.top = y + "px";
  drawEl.style.width = w + "px";
  drawEl.style.height = h + "px";
});

window.addEventListener("mouseup", (e) => {
  if (!cropDrawing) return;
  cropDrawing = false;
  $("crop-drawing").style.display = "none";

  // Convert drag corners to original image coords
  const x1 = Math.min(cropStartX, e.clientX);
  const y1 = Math.min(cropStartY, e.clientY);
  const x2 = Math.max(cropStartX, e.clientX);
  const y2 = Math.max(cropStartY, e.clientY);

  const p1 = clientToPreview(x1, y1);
  const p2 = clientToPreview(x2, y2);
  const o1 = previewToOrig(p1.x, p1.y);
  const o2 = previewToOrig(p2.x, p2.y);

  // Clamp to image bounds
  const oh = currentDims[0], ow = currentDims[1];
  const cx = Math.max(0, o1.x);
  const cy = Math.max(0, o1.y);
  const cw = Math.min(ow, o2.x) - cx;
  const ch = Math.min(oh, o2.y) - cy;

  if (cw < 10 || ch < 10) return; // too small, ignore

  setLoading(true);
  fetch("/api/crop", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({x: cx, y: cy, w: cw, h: ch}),
  })
  .then(r => r.json())
  .then(data => {
    setLoading(false);
    if (data.error) { alert(data.error); return; }
    cropRectOrig = data.crop_rect;
    img.src = "/api/preview/result?" + Date.now();
    updateUI(data.params);
    updateCropOverlay();
  })
  .catch(e => { setLoading(false); alert("Crop failed: " + e); });
});

// ---- Histogram ----
let histVisible = false;
const histCanvas = $("histogram-canvas");
const histCtx = histCanvas.getContext("2d");
const histWrap = $("histogram-wrap");

function fetchAndDrawHistogram() {
  if (!histVisible) return;
  fetch("/api/histogram")
    .then(r => r.json())
    .then(data => {
      if (data.error) return;
      drawHistogram(data);
    })
    .catch(() => {});
}

function drawHistogram(data) {
  const w = histCanvas.width, h = histCanvas.height;
  histCtx.clearRect(0, 0, w, h);

  const maxVal = Math.max(
    ...data.r, ...data.g, ...data.b
  );
  if (maxVal === 0) return;

  const colors = {r: "rgba(255,80,80,0.6)", g: "rgba(80,255,80,0.6)", b: "rgba(80,130,255,0.6)"};

  for (const ch of ["r", "g", "b"]) {
    const bins = data[ch];
    // Log scale for visibility
    const logBins = bins.map(v => Math.log(v + 1));
    const logMax = Math.max(...logBins);

    histCtx.beginPath();
    histCtx.moveTo(0, h);
    for (let i = 0; i < 256; i++) {
      const x = (i / 255) * w;
      const y = h - (logBins[i] / logMax) * (h - 4);
      histCtx.lineTo(x, y);
    }
    histCtx.lineTo(w, h);
    histCtx.closePath();
    histCtx.fillStyle = colors[ch];
    histCtx.fill();
  }
}

function toggleHistogram() {
  histVisible = !histVisible;
  histWrap.classList.toggle("visible", histVisible);
  $("btn-histogram").classList.toggle("btn-active", histVisible);
  if (histVisible) fetchAndDrawHistogram();
}

$("btn-histogram").addEventListener("click", toggleHistogram);

// Fetch histogram after every preview update
const origDoInvert = doInvert;
doInvert = function() {
  setLoading(true);
  fetch("/api/invert", {method: "POST"})
  .then(r => r.json())
  .then(data => {
    setLoading(false);
    if (data.error) { alert(data.error); return; }
    img.src = "/api/preview/result?" + Date.now();
    currentSrcIsOriginal = false;
    updateUI(data.params);
    fetchAndDrawHistogram();
  })
  .catch(e => { setLoading(false); alert("Invert failed: " + e); });
};

// ---- Before/After toggle ----
let currentSrcIsOriginal = false;
let lastResultSrc = "";
let lastOrigSrc = "";

function toggleBeforeAfter() {
  if (!currentFilename) return;
  if (currentSrcIsOriginal) {
    if (lastResultSrc) img.src = lastResultSrc;
    else img.src = "/api/preview/result?" + Date.now();
    currentSrcIsOriginal = false;
  } else {
    lastResultSrc = img.src;
    img.src = "/api/preview/orig?" + Date.now();
    currentSrcIsOriginal = true;
  }
}

$("btn-before-after").addEventListener("click", toggleBeforeAfter);

// Presets
$("btn-preset-color").addEventListener("click", () => {
  fetch("/api/preset/color", {method: "POST"})
  .then(r => r.json()).then(data => updateUI(data));
});
$("btn-preset-bw").addEventListener("click", () => {
  fetch("/api/preset/bw", {method: "POST"})
  .then(r => r.json()).then(data => updateUI(data));
});

// Export
function doExport(dtype) {
  setLoading(true);
  fetch("/api/export", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({dtype}),
  })
  .then(r => {
    setLoading(false);
    if (!r.ok) return r.json().then(d => { throw new Error(d.error); });
    return r.blob();
  })
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "negconv_output.tif";
    a.click();
    URL.revokeObjectURL(url);
  })
  .catch(e => { setLoading(false); alert("Export failed: " + e); });
}
$("btn-export-16").addEventListener("click", () => doExport("uint16"));
$("btn-export-32").addEventListener("click", () => doExport("float32"));

// ---- Zoom & Pan ----
function applyTransform() {
  viewerImg.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
  updateCropOverlay();
}
function fitToWindow() {
  panX = 0; panY = 0;
  if (!previewWidth || !previewHeight) { zoomLevel = 1; applyTransform(); return; }
  const vw = $("viewer").clientWidth;
  const vh = $("viewer").clientHeight;
  zoomLevel = Math.min(vw / previewWidth, vh / previewHeight);
  panX = (vw - previewWidth * zoomLevel) / 2;
  panY = (vh - previewHeight * zoomLevel) / 2;
  applyTransform();
}
function resetZoom() {
  zoomLevel = 1; panX = 0; panY = 0; applyTransform();
}

$("viewer").addEventListener("wheel", (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoomLevel = Math.max(0.1, Math.min(10, zoomLevel * delta));
  applyTransform();
}, {passive: false});

$("viewer").addEventListener("mousedown", (e) => {
  if (e.button === 0 && !pickingDmin && !cropMode) {
    isPanning = true;
    lastMouseX = e.clientX; lastMouseY = e.clientY;
    img.style.cursor = "grabbing";
  }
});
window.addEventListener("mousemove", (e) => {
  if (!isPanning) return;
  panX += e.clientX - lastMouseX;
  panY += e.clientY - lastMouseY;
  lastMouseX = e.clientX; lastMouseY = e.clientY;
  applyTransform();
});
window.addEventListener("mouseup", (e) => {
  if (isPanning) {
    isPanning = false;
    img.style.cursor = cropMode ? "crosshair" : (pickingDmin ? "crosshair" : "default");
  }
});

// ---- Draggable sidebar resize handle ----
const handle = $("resize-handle");
const sidebar = $("sidebar");
let isResizing = false;

handle.addEventListener("mousedown", (e) => {
  e.preventDefault();
  isResizing = true;
  handle.classList.add("active");
  document.body.style.cursor = "col-resize";
  document.body.style.userSelect = "none";
});
window.addEventListener("mousemove", (e) => {
  if (!isResizing) return;
  const newWidth = window.innerWidth - e.clientX;
  const clamped = Math.max(200, Math.min(500, newWidth));
  sidebar.style.width = clamped + "px";
});
window.addEventListener("mouseup", () => {
  if (isResizing) {
    isResizing = false;
    handle.classList.remove("active");
    document.body.style.cursor = "";
    document.body.style.userSelect = "";
  }
});

// ---- Clear button ----
$("btn-clear").addEventListener("click", () => {
  img.style.display = "none";
  img.src = "";
  previewWidth = 0; previewHeight = 0;
  currentFilename = ""; currentDims = [0, 0];
  pickingDmin = false; cropMode = false;
  cropRectOrig = null;
  $("btn-pick").classList.remove("btn-active");
  $("btn-crop").classList.remove("btn-active");
  $("filepath").value = "";
  $("dmin-r").value = ""; $("dmin-g").value = ""; $("dmin-b").value = "";
  updateStatus();
  resetZoom();
  fetch("/api/clear", {method: "POST"}).catch(() => {});
});

// Enter key in filepath input triggers load
$("filepath").addEventListener("keydown", (e) => {
  if (e.key === "Enter") $("btn-load").click();
});

// ---- Keyboard shortcuts ----
document.addEventListener("keydown", (e) => {
  // Don't fire shortcuts when typing in inputs
  const tag = e.target.tagName;
  if (tag === "INPUT" || tag === "TEXTAREA" || tag === "SELECT") return;

  if (e.key === "h" || e.key === "H") {
    toggleHistogram();
  } else if (e.key === "\\") {
    toggleBeforeAfter();
  } else if (e.key === "e" || e.key === "E") {
    $("btn-pick").click();
  } else if (e.key === "c" || e.key === "C") {
    $("btn-crop").click();
  } else if (e.key === "Escape") {
    if (pickingDmin) { $("btn-pick").click(); }
    if (cropMode) { $("btn-crop").click(); }
  } else if (e.key === " ") {
    e.preventDefault();
    fitToWindow();
  }
});
</script>
