<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>negconv</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a1a; color: #ddd; display: flex; height: 100vh; overflow: hidden; }

/* Viewer area */
#viewer { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; background: #111; }
#viewer-img { max-width: 100%; max-height: 100%; transform-origin: 0 0; }
#viewer img { display: block; }
#loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-size: 1.2em; display: none; }
#loading.active { display: block; }

/* Sidebar */
#sidebar { width: 320px; background: #222; border-left: 1px solid #333; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }
#sidebar h2 { font-size: 1em; color: #999; text-transform: uppercase; letter-spacing: 0.05em; border-bottom: 1px solid #333; padding-bottom: 4px; }
#sidebar label { display: flex; justify-content: space-between; align-items: center; font-size: 0.85em; }
#sidebar input[type="range"] { width: 140px; }
#sidebar input[type="number"] { width: 70px; background: #333; border: 1px solid #444; color: #ddd; padding: 2px 4px; border-radius: 3px; font-size: 0.85em; }
#sidebar .val { font-variant-numeric: tabular-nums; min-width: 50px; text-align: right; color: #aaa; font-size: 0.85em; }
.btn { padding: 8px 14px; border: 1px solid #555; background: #333; color: #ddd; border-radius: 4px; cursor: pointer; font-size: 0.9em; }
.btn:hover { background: #444; }
.btn-primary { background: #2a6; border-color: #2a6; }
.btn-primary:hover { background: #397; }
.btn-active { background: #c63; border-color: #c63; }
#file-row { display: flex; gap: 6px; }
#file-row input { flex: 1; background: #333; border: 1px solid #444; color: #ddd; padding: 6px 8px; border-radius: 3px; font-size: 0.9em; }
#status { font-size: 0.8em; color: #888; line-height: 1.5; }
.preset-row { display: flex; gap: 6px; }
.preset-row .btn { flex: 1; text-align: center; }
.section { display: flex; flex-direction: column; gap: 6px; }
</style>
</head>
<body>

<div id="viewer">
  <div id="loading">Loading...</div>
  <div id="viewer-img">
    <img id="preview" src="" alt="Load an image to begin" style="display:none;">
  </div>
</div>

<div id="sidebar">

  <!-- File load -->
  <div class="section">
    <h2>File</h2>
    <div id="file-row">
      <input id="filepath" type="text" placeholder="/path/to/scan.ARW" spellcheck="false">
      <button class="btn btn-primary" id="btn-load">Load</button>
    </div>
    <div id="status">No image loaded</div>
  </div>

  <!-- Eyedropper -->
  <div class="section">
    <h2>Dmin (film base)</h2>
    <div style="display:flex;gap:6px;align-items:center;">
      <button class="btn" id="btn-pick">Pick Dmin</button>
      <span style="font-size:0.85em;">Click film base area</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px;">
      <label>R <input type="number" id="dmin-r" step="0.001" min="0.01" max="2.0" value="" readonly></label>
      <label>G <input type="number" id="dmin-g" step="0.001" min="0.01" max="2.0" value="" readonly></label>
      <label>B <input type="number" id="dmin-b" step="0.001" min="0.01" max="2.0" value="" readonly></label>
    </div>
  </div>

  <!-- Presets -->
  <div class="section">
    <h2>Presets</h2>
    <div class="preset-row">
      <button class="btn" id="btn-preset-color">Color (C-41)</button>
      <button class="btn" id="btn-preset-bw">B&amp;W</button>
    </div>
  </div>

  <!-- Invert -->
  <div class="section">
    <button class="btn btn-primary" id="btn-invert" style="width:100%">Invert</button>
  </div>

  <!-- Parameters -->
  <div class="section">
    <h2>Parameters</h2>
    <label>Dmax <input type="range" id="sl-dmax" min="0.5" max="4.0" step="0.01" value="1.6"> <span class="val" id="v-dmax">1.60</span></label>
    <label>Gamma <input type="range" id="sl-gamma" min="1.0" max="8.0" step="0.1" value="4.0"> <span class="val" id="v-gamma">4.0</span></label>
    <label>Exposure <input type="range" id="sl-exposure" min="0.1" max="2.0" step="0.01" value="0.92"> <span class="val" id="v-exposure">0.92</span></label>
    <label>Black <input type="range" id="sl-black" min="0.0" max="0.5" step="0.01" value="0.08"> <span class="val" id="v-black">0.08</span></label>
    <label>Soft clip <input type="range" id="sl-softclip" min="0.0" max="1.0" step="0.01" value="0.75"> <span class="val" id="v-softclip">0.75</span></label>
    <label>Offset <input type="range" id="sl-offset" min="-0.5" max="0.5" step="0.01" value="-0.05"> <span class="val" id="v-offset">-0.05</span></label>
  </div>

  <div class="section">
    <h2>White Balance High</h2>
    <label>R <input type="range" id="sl-wbh-r" min="0.5" max="2.0" step="0.01" value="1.0"> <span class="val" id="v-wbh-r">1.00</span></label>
    <label>G <input type="range" id="sl-wbh-g" min="0.5" max="2.0" step="0.01" value="1.0"> <span class="val" id="v-wbh-g">1.00</span></label>
    <label>B <input type="range" id="sl-wbh-b" min="0.5" max="2.0" step="0.01" value="1.0"> <span class="val" id="v-wbh-b">1.00</span></label>
  </div>

  <div class="section">
    <h2>White Balance Low</h2>
    <label>R <input type="range" id="sl-wbl-r" min="0.5" max="2.0" step="0.01" value="1.0"> <span class="val" id="v-wbl-r">1.00</span></label>
    <label>G <input type="range" id="sl-wbl-g" min="0.5" max="2.0" step="0.01" value="1.0"> <span class="val" id="v-wbl-g">1.00</span></label>
    <label>B <input type="range" id="sl-wbl-b" min="0.5" max="2.0" step="0.01" value="1.0"> <span class="val" id="v-wbl-b">1.00</span></label>
  </div>

  <!-- Export -->
  <div class="section">
    <h2>Export</h2>
    <div style="display:flex;gap:6px;">
      <button class="btn" id="btn-export-16" style="flex:1">TIFF 16-bit</button>
      <button class="btn" id="btn-export-32" style="flex:1">TIFF 32f</button>
    </div>
  </div>

</div>

<script>
// State
let pickingDmin = false;
let previewWidth = 0;
let previewHeight = 0;
let zoomLevel = 1;
let panX = 0, panY = 0;
let isPanning = false;
let lastMouseX = 0, lastMouseY = 0;
let debounceTimer = null;

const $ = id => document.getElementById(id);
const img = $("preview");
const viewerImg = $("viewer-img");

// Loading indicator
function setLoading(on) {
  $("loading").classList.toggle("active", on);
}

// Update slider displays
const sliderMap = {
  "sl-dmax":     { val: "v-dmax",     key: "d_max",    fmt: v => v.toFixed(2) },
  "sl-gamma":    { val: "v-gamma",    key: "gamma",    fmt: v => v.toFixed(1) },
  "sl-exposure": { val: "v-exposure", key: "exposure", fmt: v => v.toFixed(2) },
  "sl-black":    { val: "v-black",    key: "black",    fmt: v => v.toFixed(2) },
  "sl-softclip": { val: "v-softclip", key: "soft_clip",fmt: v => v.toFixed(2) },
  "sl-offset":   { val: "v-offset",   key: "offset",   fmt: v => v.toFixed(2) },
  "sl-wbh-r":    { val: "v-wbh-r",    key: null,       fmt: v => v.toFixed(2) },
  "sl-wbh-g":    { val: "v-wbh-g",    key: null,       fmt: v => v.toFixed(2) },
  "sl-wbh-b":    { val: "v-wbh-b",    key: null,       fmt: v => v.toFixed(2) },
  "sl-wbl-r":    { val: "v-wbl-r",    key: null,       fmt: v => v.toFixed(2) },
  "sl-wbl-g":    { val: "v-wbl-g",    key: null,       fmt: v => v.toFixed(2) },
  "sl-wbl-b":    { val: "v-wbl-b",    key: null,       fmt: v => v.toFixed(2) },
};

// Gather current params from sliders
function gatherParams() {
  return {
    d_max:    parseFloat($("sl-dmax").value),
    gamma:    parseFloat($("sl-gamma").value),
    exposure: parseFloat($("sl-exposure").value),
    black:    parseFloat($("sl-black").value),
    soft_clip:parseFloat($("sl-softclip").value),
    offset:   parseFloat($("sl-offset").value),
    wb_high:  [
      parseFloat($("sl-wbh-r").value),
      parseFloat($("sl-wbh-g").value),
      parseFloat($("sl-wbh-b").value),
    ],
    wb_low: [
      parseFloat($("sl-wbl-r").value),
      parseFloat($("sl-wbl-g").value),
      parseFloat($("sl-wbl-b").value),
    ],
  };
}

// Push params to server and re-invert
function pushParams() {
  fetch("/api/params", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(gatherParams()),
  }).then(() => doInvert());
}

// Debounced param push
function onSliderChange() {
  const info = sliderMap[this.id];
  if (info) $(info.val).textContent = info.fmt(parseFloat(this.value));
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(pushParams, 300);
}

// Bind all sliders
Object.keys(sliderMap).forEach(id => {
  const el = $(id);
  if (el) el.addEventListener("input", onSliderChange);
});

// Update UI from server params
function updateUI(params) {
  if (params.dmin) {
    $("dmin-r").value = params.dmin[0].toFixed(4);
    $("dmin-g").value = params.dmin[1].toFixed(4);
    $("dmin-b").value = params.dmin[2].toFixed(4);
  }
  $("sl-dmax").value = params.d_max;     $("v-dmax").textContent = params.d_max.toFixed(2);
  $("sl-gamma").value = params.gamma;    $("v-gamma").textContent = params.gamma.toFixed(1);
  $("sl-exposure").value = params.exposure; $("v-exposure").textContent = params.exposure.toFixed(2);
  $("sl-black").value = params.black;    $("v-black").textContent = params.black.toFixed(2);
  $("sl-softclip").value = params.soft_clip; $("v-softclip").textContent = params.soft_clip.toFixed(2);
  $("sl-offset").value = params.offset;  $("v-offset").textContent = params.offset.toFixed(2);
  if (params.wb_high) {
    $("sl-wbh-r").value = params.wb_high[0]; $("v-wbh-r").textContent = params.wb_high[0].toFixed(2);
    $("sl-wbh-g").value = params.wb_high[1]; $("v-wbh-g").textContent = params.wb_high[1].toFixed(2);
    $("sl-wbh-b").value = params.wb_high[2]; $("v-wbh-b").textContent = params.wb_high[2].toFixed(2);
  }
  if (params.wb_low) {
    $("sl-wbl-r").value = params.wb_low[0]; $("v-wbl-r").textContent = params.wb_low[0].toFixed(2);
    $("sl-wbl-g").value = params.wb_low[1]; $("v-wbl-g").textContent = params.wb_low[1].toFixed(2);
    $("sl-wbl-b").value = params.wb_low[2]; $("v-wbl-b").textContent = params.wb_low[2].toFixed(2);
  }
}

// Load image
$("btn-load").addEventListener("click", () => {
  const path = $("filepath").value.trim();
  if (!path) return;
  setLoading(true);
  fetch("/api/load", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({path}),
  })
  .then(r => r.json())
  .then(data => {
    setLoading(false);
    if (data.error) { alert(data.error); return; }
    img.src = "/api/preview/orig?" + Date.now();
    img.style.display = "block";
    if (data.preview_dims) {
      previewWidth = data.preview_dims[0];
      previewHeight = data.preview_dims[1];
    }
    updateUI(data.params);
    $("status").textContent = `${data.filename}  ${data.dims[0]}x${data.dims[1]}`;
    resetZoom();
  })
  .catch(e => { setLoading(false); alert("Load failed: " + e); });
});

// Invert
function doInvert() {
  setLoading(true);
  fetch("/api/invert", {method: "POST"})
  .then(r => r.json())
  .then(data => {
    setLoading(false);
    if (data.error) { alert(data.error); return; }
    img.src = "/api/preview/result?" + Date.now();
    updateUI(data.params);
  })
  .catch(e => { setLoading(false); alert("Invert failed: " + e); });
}
$("btn-invert").addEventListener("click", doInvert);

// Eyedropper
$("btn-pick").addEventListener("click", () => {
  pickingDmin = !pickingDmin;
  $("btn-pick").classList.toggle("btn-active", pickingDmin);
  img.style.cursor = pickingDmin ? "crosshair" : "default";
});

img.addEventListener("click", (e) => {
  if (!pickingDmin) return;

  // Account for CSS transform (zoom + pan) when mapping click to image pixel coords.
  // The image is displayed at its natural size inside viewer-img, which has a CSS transform.
  // e.offsetX/offsetY are relative to the target element in its *transformed* coordinate space,
  // but we need coords relative to the original (un-transformed) image.
  const rect = img.getBoundingClientRect();
  const scaleX = previewWidth / rect.width;
  const scaleY = previewHeight / rect.height;
  const px = Math.round((e.clientX - rect.left) * scaleX);
  const py = Math.round((e.clientY - rect.top) * scaleY);

  setLoading(true);
  fetch("/api/pick-dmin", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({x: px, y: py}),
  })
  .then(r => r.json())
  .then(data => {
    setLoading(false);
    if (data.error) { alert(data.error); return; }
    updateUI(data.params);
    img.src = "/api/preview/result?" + Date.now();
    $("status").textContent += `\nDmin: R=${data.dmin[0].toFixed(4)} G=${data.dmin[1].toFixed(4)} B=${data.dmin[2].toFixed(4)}`;
  })
  .catch(e => { setLoading(false); alert("Pick failed: " + e); });
});

// Presets
$("btn-preset-color").addEventListener("click", () => {
  fetch("/api/preset/color", {method: "POST"})
  .then(r => r.json()).then(data => updateUI(data));
});
$("btn-preset-bw").addEventListener("click", () => {
  fetch("/api/preset/bw", {method: "POST"})
  .then(r => r.json()).then(data => updateUI(data));
});

// Export
function doExport(dtype) {
  setLoading(true);
  fetch("/api/export", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({dtype}),
  })
  .then(r => {
    setLoading(false);
    if (!r.ok) return r.json().then(d => { throw new Error(d.error); });
    return r.blob();
  })
  .then(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "negconv_output.tif";
    a.click();
    URL.revokeObjectURL(url);
  })
  .catch(e => { setLoading(false); alert("Export failed: " + e); });
}
$("btn-export-16").addEventListener("click", () => doExport("uint16"));
$("btn-export-32").addEventListener("click", () => doExport("float32"));

// Zoom & Pan
function applyTransform() {
  viewerImg.style.transform = `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
}
function resetZoom() {
  zoomLevel = 1;
  panX = 0;
  panY = 0;
  applyTransform();
}

$("viewer").addEventListener("wheel", (e) => {
  e.preventDefault();
  const delta = e.deltaY > 0 ? 0.9 : 1.1;
  zoomLevel = Math.max(0.1, Math.min(10, zoomLevel * delta));
  applyTransform();
}, {passive: false});

$("viewer").addEventListener("mousedown", (e) => {
  if (e.button === 0 && !pickingDmin) {
    isPanning = true;
    lastMouseX = e.clientX;
    lastMouseY = e.clientY;
    img.style.cursor = "grabbing";
  }
});
window.addEventListener("mousemove", (e) => {
  if (!isPanning) return;
  panX += e.clientX - lastMouseX;
  panY += e.clientY - lastMouseY;
  lastMouseX = e.clientX;
  lastMouseY = e.clientY;
  applyTransform();
});
window.addEventListener("mouseup", () => {
  if (isPanning) {
    isPanning = false;
    img.style.cursor = pickingDmin ? "crosshair" : "default";
  }
});

// Enter key in filepath input triggers load
$("filepath").addEventListener("keydown", (e) => {
  if (e.key === "Enter") $("btn-load").click();
});
</script>
</body>
</html>
